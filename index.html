<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Tập JS Buổi 9 (Bootstrap v5)</title>
    <!-- Tích hợp Bootstrap 5 CSS từ CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Link tới file CSS tùy chỉnh riêng -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-light">

<div class="container my-5" style="max-width: 700px;">
    <div class="text-center mb-5">
        <h1 class="fw-bold text-primary">Bài Tập JavaScript Buổi 9</h1>
    </div>

    <!-- BÀI 1: TÍNH LƯƠNG NHÂN VIÊN -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="card-title mb-0">Bài 1: Tính tiền lương nhân viên</h5>
        </div>
        <div class="card-body">
            <p class="card-text text-muted small">Lương 1 ngày: 100.000 VND</p>
            <div class="mb-3">
                <label for="soNgayLam" class="form-label fw-semibold">Số ngày làm việc:</label>
                <input type="number" id="soNgayLam" class="form-control" placeholder="Nhập số ngày làm...">
            </div>
            <button onclick="tinhLuong()" class="btn btn-primary w-100">Tính lương</button>
            <div id="txtLuong" class="alert alert-success mt-3 custom-result"></div>
        </div>
    </div>

    <!-- BÀI 2: TÍNH GIÁ TRỊ TRUNG BÌNH -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="card-title mb-0">Bài 2: Tính giá trị trung bình</h5>
        </div>
        <div class="card-body">
            <label class="form-label fw-semibold mb-2">Nhập vào 5 số thực:</label>
            <div class="row g-2 mb-3">
                <div class="col"><input type="number" id="num1" class="form-control" placeholder="Số 1"></div>
                <div class="col"><input type="number" id="num2" class="form-control" placeholder="Số 2"></div>
                <div class="col"><input type="number" id="num3" class="form-control" placeholder="Số 3"></div>
                <div class="col"><input type="number" id="num4" class="form-control" placeholder="Số 4"></div>
                <div class="col"><input type="number" id="num5" class="form-control" placeholder="Số 5"></div>
            </div>
            <button onclick="tinhTrungBinh()" class="btn btn-primary w-100">Tính trung bình</button>
            <div id="txtTrungBinh" class="alert alert-success mt-3 custom-result"></div>
        </div>
    </div>

    <!-- BÀI 3: QUY ĐỔI TIỀN -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="card-title mb-0">Bài 3: Quy đổi tiền (USD -> VND)</h5>
        </div>
        <div class="card-body">
            <p class="card-text text-muted small">Tỷ giá cố định: 1 USD = 23.500 VND</p>
            <div class="mb-3">
                <label for="usd" class="form-label fw-semibold">Số tiền USD cần đổi:</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" id="usd" class="form-control" placeholder="Nhập số tiền USD...">
                </div>
            </div>
            <button onclick="quyDoiTien()" class="btn btn-primary w-100 fw-semibold">Quy đổi</button>
            <div id="txtQuyDoi" class="alert alert-success mt-3 custom-result"></div>
        </div>
    </div>

    <!-- BÀI 4: TÍNH DIỆN TÍCH, CHU VI HCN -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="card-title mb-0">Bài 4: Tính diện tích, chu vi HCN</h5>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-6 mb-3 mb-md-0">
                    <label for="chieuDai" class="form-label fw-semibold">Chiều dài:</label>
                    <input type="number" id="chieuDai" class="form-control" placeholder="Nhập chiều dài...">
                </div>
                <div class="col-md-6">
                    <label for="chieuRong" class="form-label fw-semibold">Chiều rộng:</label>
                    <input type="number" id="chieuRong" class="form-control" placeholder="Nhập chiều rộng...">
                </div>
            </div>
            <button onclick="tinhHCN()" class="btn btn-primary w-100">Tính toán</button>
            <div id="txtHCN" class="alert alert-success mt-3 custom-result"></div>
        </div>
    </div>

    <!-- BÀI 5: TÍNH TỔNG 2 KÝ SỐ -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="card-title mb-0">Bài 5: Tính tổng 2 ký số</h5>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label for="so2ChuSo" class="form-label fw-semibold">Nhập số có 2 chữ số:</label>
                <input type="number" id="so2ChuSo" class="form-control" placeholder="Ví dụ: 12, 44, 83..." min="10" max="99">
            </div>
            <button onclick="tinhTongKySo()" class="btn btn-primary w-100 fw-semibold">Tính tổng ký số</button>
            <div id="txtKySo" class="alert alert-success mt-3 custom-result"></div>
        </div>
    </div>
</div>

<!-- Link tới file xử lý logic JavaScript bên ngoài -->
<script src="./js/buoi9.js"></script>
</body>
</html>
